<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求概述</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'Noto Sans JP', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f3f3f3;
            padding: 24px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.9);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 32px;
        }
        
        .header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e7e7e7;
        }
        
        .project-title {
            font-size: 28px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.9);
            margin-bottom: 8px;
        }
        
        .project-meta {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.6);
            display: flex;
            gap: 16px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .section {
            margin-bottom: 32px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid #0052d9;
        }
        
        .section-content {
            color: rgba(0, 0, 0, 0.7);
            font-size: 14px;
            line-height: 1.8;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .card {
            background-color: #f8f8f8;
            border-radius: 6px;
            padding: 20px;
            border: 1px solid #e7e7e7;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(0, 0, 0, 0.9);
        }
        
        .card-content {
            font-size: 14px;
            color: rgba(0, 0, 0, 0.6);
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-top: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e7e7e7;
        }
        
        th {
            background-color: #f8f8f8;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
        }
        
        td {
            color: rgba(0, 0, 0, 0.7);
        }
        
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background-color: #e8f3ff;
            color: #0052d9;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
        }
        
        .flow-diagram {
            background-color: #f8f8f8;
            border-radius: 6px;
            padding: 24px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 13px;
            overflow-x: auto;
        }
        
        pre {
            background-color: #f8f8f8;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <h1 class="project-title">{{PROJECT_NAME}}</h1>
            <div class="project-meta">
                <span class="meta-item">📅 版本：{{VERSION}}</span>
                <span class="meta-item">📝 更新日期：{{DATE}}</span>
                <span class="meta-item">👤 负责人：{{OWNER}}</span>
            </div>
        </div>
        
        <!-- 项目背景 -->
        <div class="section">
            <h2 class="section-title">1. 项目背景</h2>
            <div class="section-content">
                {{BACKGROUND_CONTENT}}
            </div>
        </div>
        
        <!-- 项目目标 -->
        <div class="section">
            <h2 class="section-title">2. 项目目标</h2>
            <div class="section-content">
                {{OBJECTIVE_CONTENT}}
            </div>
        </div>
        
        <!-- 项目边界 -->
        <div class="section">
            <h2 class="section-title">3. 项目边界</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-title">🎯 范围内</div>
                    <div class="card-content">{{IN_SCOPE}}</div>
                </div>
                <div class="card">
                    <div class="card-title">🚫 范围外</div>
                    <div class="card-content">{{OUT_SCOPE}}</div>
                </div>
            </div>
        </div>
        
        <!-- 用户角色 -->
        <div class="section">
            <h2 class="section-title">4. 用户角色</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>角色</th>
                            <th>描述</th>
                            <th>标签</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{USER_ROLES}}
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 页面清单 -->
        <div class="section">
            <h2 class="section-title">5. 页面清单</h2>
            <div class="card-grid">
                {{PAGE_LIST}}
            </div>
        </div>
        
        <!-- 业务流程 -->
        <div class="section">
            <h2 class="section-title">6. 业务流程</h2>
            <div class="flow-diagram">
                {{FLOW_DIAGRAM}}
            </div>
        </div>
    </div>
</body>
</html>
