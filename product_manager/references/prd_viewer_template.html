<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} - 产品需求文档</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0052D9;
            --primary-light: #F2F3FF;
            --gray-1: #F3F3F3;
            --gray-3: #E7E7E7;
            --gray-4: #DCDCDC;
            --text-primary: rgba(0, 0, 0, 0.9);
            --text-secondary: rgba(0, 0, 0, 0.6);
            --text-placeholder: rgba(0, 0, 0, 0.4);
            --white: #FFFFFF;
        }
        
        body {
            font-family: 'Anonymous Pro', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--white);
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        
        .sidebar {
            width: 232px;
            background: var(--white);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid var(--gray-3);
        }
        
        .sidebar-header {
            height: 56px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--gray-3);
            display: flex;
            align-items: center;
        }
        
        .sidebar-logo {
            height: 28px;
            object-fit: contain;
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .version-selector {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .group-title {
            font-size: 12px;
            color: var(--text-placeholder);
            padding: 0 16px 4px 16px;
        }
        
        .dropdown {
            border: 0.5px solid var(--gray-4);
            border-radius: 6px;
            padding: 6px;
            background: var(--white);
            margin: 0 8px;
        }

        .dropdown-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 8px;
            border-radius: 3px;
        }

        .dropdown-text {
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 7px 16px;
            border-radius: 3px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .menu-item-sub {
            padding: 7px 16px 7px 44px;
            color: var(--text-secondary);
            border-radius: 3px;
            cursor: pointer;
        }
        
        .menu-item:hover, .menu-item-sub:hover {
            background: var(--gray-1);
        }
        
        .menu-item.active, .menu-item-sub.active {
            background: var(--primary-light);
            color: var(--primary);
        }
        
        .menu-item-icon {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--gray-1);
            overflow: hidden;
        }
        
        .content-header {
            height: 56px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            font-weight: 600;
        }
        
        .content-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        .single-view {
            width: 100%;
            height: 100%;
        }
        
        .split-view {
            display: flex;
            width: 100%;
            height: 100%;
        }
        
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
            margin: 0;
            border-radius: 0;
            border: none;
            overflow: hidden;
        }
        
        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--white);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <img class="sidebar-logo" src="assets/image.png" alt="Logo" onerror="this.style.display='none'">
            </div>
            <div class="sidebar-content">
                <div class="version-selector">
                    <div class="group-title">选择需求版本</div>
                    <div class="dropdown">
                        <div class="dropdown-inner">
                            <span class="dropdown-text">版本 {{VERSION}}</span>
                            <span>▼</span>
                        </div>
                    </div>
                </div>

                <div class="menu-section">
                    <div class="group-title" style="margin-top: 16px;">项目需求</div>
                    <div class="menu-item active" data-page="overview">
                        <span class="menu-item-icon">📄</span>
                        <span>需求概述</span>
                    </div>
                </div>
                
                <div class="menu-section">
                    <div class="menu-item">
                        <span class="menu-item-icon">📱</span>
                        <span>小程序端页面需求</span>
                    </div>
                    {{C_END_MENU_ITEMS}}
                </div>
                
                <div class="menu-section">
                    <div class="menu-item">
                        <span class="menu-item-icon">💻</span>
                        <span>管理端页面需求</span>
                    </div>
                    {{B_END_MENU_ITEMS}}
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="content-header" id="page-title" style="display: none;">需求概述</div>
            <div class="content-body" id="content-body">
                <div class="single-view" id="single-view">
                    <iframe class="iframe-container" id="content-iframe" src="html/overview.html"></iframe>
                </div>
                <div class="split-view" id="split-view" style="display: none;">
                    <div class="panel" style="border-right: 1px solid var(--gray-3);">
                        <iframe class="iframe-container" id="prototype-iframe"></iframe>
                    </div>
                    <div class="panel">
                        <iframe class="iframe-container" id="document-iframe"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const menuItems = document.querySelectorAll('.menu-item-sub, .menu-item[data-page="overview"]');
        const pageTitle = document.getElementById('page-title');
        const singleView = document.getElementById('single-view');
        const splitView = document.getElementById('split-view');
        const contentIframe = document.getElementById('content-iframe');
        const prototypeIframe = document.getElementById('prototype-iframe');
        const documentIframe = document.getElementById('document-iframe');
        
        let currentPage = 'overview';
        
        // {{PAGE_DATA}} 占位符将被 skill 替换为真实数据
        // 注意：当模板独立打开时，以下为示例数据
        let currentPageData = {
            "overview": {"title": "需求概述"},
            "home": {
                "title": "首页",
                "platform": "app",
                "prototypePath": "../prototyping/app/page_home.html",
                "docPath": "doc/app/home.html"
            },
            "product_list": {
                "title": "商品列表页",
                "platform": "app",
                "prototypePath": "../prototyping/app/page_product_list.html",
                "docPath": "doc/app/product_list.html"
            },
            "order_admin": {
                "title": "订单管理页",
                "platform": "web",
                "prototypePath": "../prototyping/web/page_order_admin.html",
                "docPath": "doc/web/order_admin.html"
            }
        };
        
        function loadPage(pageKey) {
            currentPage = pageKey;
            const pageData = currentPageData[pageKey];
            
            if (!pageData) return;
            
            menuItems.forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === pageKey) {
                    item.classList.add('active');
                }
            });
            
            pageTitle.textContent = pageData.title;
            
            if (pageKey === 'overview') {
                singleView.style.display = 'block';
                splitView.style.display = 'none';
                contentIframe.src = 'html/overview.html';
                // Header is not needed for overview as it has its own styling
                pageTitle.style.display = 'none';
            } else {
                singleView.style.display = 'none';
                splitView.style.display = 'flex';
                pageTitle.style.display = 'none'; // Keep hidden, since docs have their own titles and Figma 30:296 does not show a global header title for page view
                
                prototypeIframe.src = pageData.prototypePath || '';
                documentIframe.src = pageData.docPath || '';
            }
        }
        
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                loadPage(item.dataset.page);
            });
        });
    </script>
</body>
</html>
