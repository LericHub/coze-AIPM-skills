<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} - 产品需求文档</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0052D9;
            --primary-light: #F2F3FF;
            --gray-1: #F3F3F3;
            --gray-2: #E7E7E7;
            --gray-3: rgba(0, 0, 0, 0.6);
            --text-primary: rgba(0, 0, 0, 0.9);
            --white: #FFFFFF;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'Noto Sans JP', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--gray-1);
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid var(--gray-2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-2);
            background: var(--primary-light);
        }
        
        .project-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .project-version {
            font-size: 12px;
            color: var(--gray-3);
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .menu-section {
            margin-bottom: 24px;
        }
        
        .menu-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 8px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.2s;
            color: var(--gray-3);
            font-size: 14px;
        }
        
        .menu-item:hover {
            background: var(--gray-1);
            color: var(--text-primary);
        }
        
        .menu-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 500;
        }
        
        .menu-item-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .menu-divider {
            height: 1px;
            background: var(--gray-2);
            margin: 16px 0;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--white);
        }
        
        .content-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-2);
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .content-body {
            flex: 1;
            overflow: hidden;
            background: var(--gray-1);
        }
        
        .single-view {
            width: 100%;
            height: 100%;
        }
        
        .split-view {
            display: flex;
            height: 100%;
        }
        
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .panel-left {
            border-right: 1px solid var(--gray-2);
        }
        
        .panel-header {
            padding: 12px 16px;
            background: var(--gray-1);
            border-bottom: 1px solid var(--gray-2);
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-content {
            flex: 1;
            overflow: hidden;
        }
        
        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--white);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="project-title">{{PROJECT_NAME}}</div>
                <div class="project-version">版本 {{VERSION}} | {{DATE}}</div>
            </div>
            <div class="sidebar-content">
                <div class="menu-section">
                    <div class="menu-section-title">总览</div>
                    <div class="menu-item active" data-page="overview">
                        <span class="menu-item-icon">📋</span>
                        <span>需求概述</span>
                    </div>
                </div>
                
                <div class="menu-section">
                    <div class="menu-section-title">C端页面</div>
                    {{C_END_MENU_ITEMS}}
                </div>
                
                <div class="menu-section">
                    <div class="menu-section-title">B端页面</div>
                    {{B_END_MENU_ITEMS}}
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="content-header">
                <div class="content-title" id="page-title">需求概述</div>
            </div>
            <div class="content-body" id="content-body">
                <div class="single-view" id="single-view">
                    <iframe class="iframe-container" id="content-iframe" src="html/overview.html"></iframe>
                </div>
                <div class="split-view" id="split-view" style="display: none;">
                    <div class="panel panel-left">
                        <div class="panel-header">
                            <span>🎨</span> 原型预览
                        </div>
                        <div class="panel-content">
                            <iframe class="iframe-container" id="prototype-iframe"></iframe>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <span>📄</span> 需求文档
                        </div>
                        <div class="panel-content">
                            <iframe class="iframe-container" id="document-iframe"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const menuItems = document.querySelectorAll('.menu-item');
        const pageTitle = document.getElementById('page-title');
        const singleView = document.getElementById('single-view');
        const splitView = document.getElementById('split-view');
        const contentIframe = document.getElementById('content-iframe');
        const prototypeIframe = document.getElementById('prototype-iframe');
        const documentIframe = document.getElementById('document-iframe');
        
        let currentPage = 'overview';
        
        // {{PAGE_DATA}} 占位符将被 skill 替换为真实数据
        // 注意：当模板独立打开时，以下为示例数据
        let currentPageData = {
            "overview": {"title": "需求概述"},
            "home": {
                "title": "活动首页",
                "prototypePath": "app/home.html",
                "docPath": "doc/app/home.html"
            },
            "activity_list": {
                "title": "活动列表页",
                "prototypePath": "web/activity_list.html",
                "docPath": "doc/app/home.html"
            }
        };
        
        function loadPage(pageKey) {
            currentPage = pageKey;
            const pageData = currentPageData[pageKey];
            
            if (!pageData) return;
            
            menuItems.forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === pageKey) {
                    item.classList.add('active');
                }
            });
            
            pageTitle.textContent = pageData.title;
            
            if (pageKey === 'overview') {
                singleView.style.display = 'block';
                splitView.style.display = 'none';
                contentIframe.src = 'html/overview.html';
            } else {
                singleView.style.display = 'none';
                splitView.style.display = 'flex';
                prototypeIframe.src = pageData.prototypePath;
                documentIframe.src = pageData.docPath;
            }
        }
        
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                loadPage(item.dataset.page);
            });
        });
    </script>
</body>
</html>
